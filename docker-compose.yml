services:
  # ── Message Broker ──────────────────────────────────
  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda start
      - --overprovisioned
      - --smp 1
      - --memory 256M
      - --reserve-memory 0M
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr 0.0.0.0:8082
      - --advertise-pandaproxy-addr localhost:8082
    ports:
      - "9092:9092"
      - "8082:8082"
      - "9644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      retries: 5

  redpanda-console:
    image: redpandadata/console:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: redpanda:29092
    depends_on:
      redpanda:
        condition: service_healthy

  # ── Producer ────────────────────────────────────────
  producer:
    build:
      context: .
      dockerfile: producer/Dockerfile
    secrets:
      - symbols
      - stream_type
      - redpanda_broker
      - topic
      - log_level
    depends_on:
      redpanda:
        condition: service_healthy
    restart: unless-stopped

  # ── Real-time OLAP ─────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_PASSWORD_FILE: /run/secrets/clickhouse_password
    secrets:
      - clickhouse_password
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/migrations:/docker-entrypoint-initdb.d:ro
    depends_on:
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --password \"$$(cat /run/secrets/clickhouse_password)\" --query 'SELECT 1'"]
      interval: 10s
      retries: 5

  # ── Analytical DWH ─────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: binance_dwh
      POSTGRES_USER: binance
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U binance -d binance_dwh"]
      interval: 10s
      retries: 5

  # ── Batch Consumer ─────────────────────────────────
  consumer:
    build:
      context: .
      dockerfile: consumer/Dockerfile
    secrets:
      - redpanda_broker
      - topic
      - postgres_password
      - log_level
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

